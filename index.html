<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Files</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161920; --border: #252a35;
      --accent: #5b8fff; --accent2: #a78bfa;
      --text: #e8eaf0; --muted: #6b7280; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; padding-bottom: 80px; }
    header { background: linear-gradient(135deg, #0d0f14, #161336); border-bottom: 1px solid var(--border); padding: 48px 24px 40px; text-align: center; position: relative; overflow: hidden; }
    header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 50% -20%, rgba(91,143,255,.18), transparent 70%); pointer-events: none; }
    header h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 700; background: linear-gradient(135deg,#fff 30%,var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; margin-bottom: 10px; }
    header p { color: var(--muted); font-size: 1rem; font-family: 'JetBrains Mono',monospace; }
    main { max-width: 860px; margin: 0 auto; padding: 48px 24px 0; }
    .section-label { font-family: 'JetBrains Mono',monospace; font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .files-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 16px; }
    .file-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 20px 16px; display: flex; flex-direction: column; gap: 10px; transition: border-color .2s, transform .2s; }
    .file-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .file-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg,rgba(91,143,255,.2),rgba(167,139,250,.2)); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .file-name { font-weight: 600; font-size: .98rem; line-height: 1.3; }
    .file-desc { color: var(--muted); font-size: .84rem; line-height: 1.5; flex: 1; }
    .file-size { font-family: 'JetBrains Mono',monospace; font-size: .72rem; color: var(--muted); }
    .btn-dl { background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; border-radius: 8px; color: #fff; font-family: 'Space Grotesk',sans-serif; font-weight: 600; font-size: .85rem; padding: 9px 0; cursor: pointer; text-decoration: none; text-align: center; display: block; transition: opacity .2s; margin-top: 4px; }
    .btn-dl:hover { opacity: .82; }
  </style>
</head>
<body>

<header>
  <h1>📁 My Files</h1>
  <p>// click a file to download</p>
</header>

<main>
  <div class="section-label">Available files</div>
  <div class="files-grid">


    <!-- ==========================================
         HOW TO ADD A NEW FILE:
         1. Copy everything between the dashes below
         2. Paste it right after this comment block
         3. Change the 4 values (icon, name, desc, size, url)
         4. Save and re-upload index.html to GitHub
    =========================================== -->

    <!-- - - - - COPY FROM HERE - - - - -->
    <div class="file-card">
      <div class="file-icon">📦</div>                          <!-- ICON: change emoji -->
      <div class="file-name">Meow.net Offsets</div>            <!-- NAME: file name shown to users -->
      <div class="file-desc">-dissperized</div>   <!-- DESC: what the file is -->
      <div class="file-size">54.4 MB</div>                      <!-- SIZE: optional, can delete this line -->
      <a class="btn-dl" href="https://text-to-utf-16.neocities.org/meow.net%20Offsets%20-%20dissperized.cs" target="_blank" rel="noopener">⬇ Download</a>  <!-- URL: paste your link -->
    </div>
    <!-- - - - - COPY TO HERE - - - - -->


    <!-- EXAMPLE FILE 2 (delete this once you add your own) -->
    <div class="file-card">
      <div class="file-icon">📄</div>
      <div class="file-name">Meow.net Offsets</div>
      <div class="file-desc">-dissperized</div>
      <div class="file-size">54.4 MB</div>
      <a class="btn-dl" href="https://text-to-utf-16.neocities.org/meow.net%20Offsets%20-%20dissperized.cs" target="_blank" rel="noopener">⬇ Download</a>
    </div>


  </div>
</main>

</body>
</html>
